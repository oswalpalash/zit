name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        zig-version: ['0.16.0']
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{matrix.zig-version}}
      
      - name: Run quality gate
        run: zig build quality

      - name: Check public build steps
        run: python3 scripts/check_build_steps.py --skip quality --skip release-check

      - name: Check widget coverage declarations
        run: python3 scripts/check_widget_coverage.py

      - name: Check DebugAllocator cleanup assertions
        run: python3 scripts/check_debug_allocator_cleanup.py

  cross-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.16.0'

      - name: Compile Linux smoke targets
        run: zig build smoke -Dtarget=x86_64-linux

      - name: Compile Windows smoke targets
        run: zig build smoke -Dtarget=x86_64-windows

  visual-repeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.16.0'

      - name: Check deterministic visual targets
        run: python3 scripts/visual_repeat_check.py --count 4

  interactive-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.16.0'

      - name: Check interactive examples render and quit
        run: python3 scripts/interactive_example_smoke.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.16.0'
      
      - name: Check formatting
        run: zig fmt --check src/ examples/ build.zig
      
      - name: Check scripts compile
        run: python3 -m py_compile scripts/check_build_steps.py scripts/check_ci_script_coverage.py scripts/check_debug_allocator_cleanup.py scripts/check_widget_coverage.py scripts/interactive_example_smoke.py scripts/release_verify.py scripts/resize_smoke.py scripts/visual_repeat_check.py

      - name: Check CI script coverage
        run: python3 scripts/check_ci_script_coverage.py

  release-verify:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.16.0'

      - name: Run full release verification gate
        run: zig build release-check

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.16.0'
      
      - name: Generate docs
        run: zig build-lib src/main.zig -femit-docs -fno-emit-bin
      
      - name: Check README exists
        run: test -f README.md

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, cross-smoke, visual-repeat, interactive-smoke, lint, release-verify, docs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
